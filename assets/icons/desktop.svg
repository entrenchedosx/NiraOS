<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="nira-grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#00A3FF" />
    </linearGradient>
    <linearGradient id="nira-grad-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#B026FF" />
    </linearGradient>
    <filter id="nira-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g filter="url(#nira-shadow)">
    <!-- Monitor Display Body -->
    <rect x="6" y="12" width="52" height="34" rx="4" fill="rgba(255,255,255,0.05)" stroke="url(#nira-grad-cyan)" stroke-width="2" />
    
    <!-- Screen Inner Display -->
    <rect x="10" y="16" width="44" height="26" rx="2" fill="#0B0F19" />
    
    <!-- OS Screen Abstract Graphics -->
    <path d="M 10 34 C 18 24, 26 40, 36 28 C 44 20, 48 30, 54 26 L 54 42 L 10 42 Z" fill="url(#nira-grad-violet)" opacity="0.6" />
    <circle cx="20" cy="24" r="3" fill="#00F0FF" />

    <!-- Stand -->
    <path d="M 26 46 L 22 54 H 42 L 38 46" fill="none" stroke="url(#nira-grad-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="20" y1="54" x2="44" y2="54" stroke="url(#nira-grad-cyan)" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
