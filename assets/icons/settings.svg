<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="nira-grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#00A3FF" />
    </linearGradient>
    <linearGradient id="nira-grad-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#B026FF" />
    </linearGradient>
    <filter id="nira-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <g filter="url(#nira-shadow)">
    <!-- Gear Outer Ring -->
    <path d="M 32 8 V 16 M 32 48 V 56 M 8 32 H 16 M 48 32 H 56 M 15 15 L 21 21 M 43 43 L 49 49 M 15 49 L 21 43 M 43 21 L 49 15" stroke="url(#nira-grad-violet)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Central Gear Core -->
    <circle cx="32" cy="32" r="14" fill="rgba(255,255,255,0.05)" stroke="url(#nira-grad-cyan)" stroke-width="3" />
    
    <!-- Inner Spindle -->
    <circle cx="32" cy="32" r="5" fill="url(#nira-grad-cyan)" />
  </g>
</svg>
