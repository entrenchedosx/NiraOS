      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#7000FF" stop-opacity="0" />
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="48" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" />
